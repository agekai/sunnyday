<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>科技任務 - 生日快樂！</title>
<style>
@font-face {
  font-family: 'ChenYuluoyan';
  src: url('fonts/ChenYuluoyan-2.0-Thin.ttf') format('truetype');
}

body, html {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: radial-gradient(circle, #fff5f5 0%, #ffd1d1 100%);
  color: #333; font-family: 'ChenYuluoyan', sans-serif; overflow: hidden;
  display: flex; flex-direction: column; align-items: center;
}

#mainStage {
  position: relative; flex: 1; width: 100%; 
  display: flex; flex-direction: column; align-items: center; 
  justify-content: flex-start; 
  padding-top: 40px; 
  opacity: 0; animation: fadeInPage 1.5s forwards;
}

@keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

#header { text-align: center; z-index: 20; margin-bottom: 20px; }
#header h1 {
  font-size: 46px; color: #ff4757; text-shadow: 3px 3px 0px #fff;
  margin: 0; animation: bounce 0.6s infinite alternate;
}
#header p { font-size: 24px; color: #ff7f7f; margin: 5px 0; font-weight: bold; }

@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

#cakeContainer {
  position: relative; 
  margin-top: 30px; 
  animation: float 3s infinite ease-in-out;
  z-index: 10;
}
#finalCake { width: 240px; filter: drop-shadow(0 15px 25px rgba(255,100,100,0.3)); transition: transform 0.2s; }

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-20px) rotate(1deg); }
}

.char-group {
  position: absolute; bottom: 12%; width: 100%;
  display: flex; justify-content: center; align-items: flex-end;
  gap: 10px; padding: 0 10px; box-sizing: border-box;
}
.char { 
  width: 22%; max-width: 100px; 
  object-fit: contain; 
  transform: scale(0); 
  animation: popIn 0.8s cubic-bezier(0.17, 0.67, 0.83, 1.3) forwards; 
  transition: transform 0.2s, filter 0.3s;
}

#pig { animation-delay: 0.5s; width: 28%; max-width: 120px; }
#mao { animation-delay: 0.7s; }
#sunny { animation-delay: 0.9s; }
#ha { animation-delay: 1.1s; width: 18%;max-width: 80px;} /* 整體變小（原本是 22%） */   /* 最大寬度也縮小（原本是 100px） */

@keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

.confetti {
  position: absolute; width: 12px; height: 12px; opacity: 0;
  animation: confettiFall 4s linear infinite;
}
@keyframes confettiFall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

#actionBtn {
  position: absolute; bottom: 30px;
  padding: 12px 35px; background: linear-gradient(135deg, #ff4757, #ff6b81);
  color: #fff; border-radius: 50px; font-size: 22px; border: none;
  box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4); cursor: pointer;
  z-index: 100; font-family: 'ChenYuluoyan';
}
</style>
</head>
<body>

<div id="mainStage">
  <div id="header">
    <h1>Happy Birthday!</h1>
    <p>小豬生日快樂！任務大成功！</p>
  </div>

  <div id="cakeContainer">
    <img id="finalCake" src="images/final_cake.png">
  </div>

  <div class="char-group">
    <!-- 加入 data-normal 和 data-party 屬性來儲存圖片路徑 -->
    <img id="mao" class="char" 
         src="images/characters/maoqiustar.png" 
         data-normal="images/characters/maoqiustar.png" 
         data-party="images/characters/maoqiu_party.png">
         
    <img id="pig" class="char" 
         src="images/characters/pigstar.png" 
         data-normal="images/characters/pigstar.png" 
         data-party="images/characters/pigstar_party.png">

    <img id="sunny" class="char" 
         src="images/characters/sunnypig.png" 
         data-normal="images/characters/sunnypig.png" 
         data-party="images/characters/sunnypig_party.png">

    <img id="ha" class="char" 
         src="images/characters/hachustar.png" 
         data-normal="images/characters/hachustar.png" 
         data-party="images/characters/hachu_party.png">
  </div>

  <button id="actionBtn" onclick="location.href='index.html'">sunny day</button>
</div>

<script>
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let isPlaying = false;
let isNFCOnly = false; // 新增：用來標記是否已啟用 NFC 模式

const FREQ = {
    C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, Bb4: 466.16, C5: 523.25
};

const song = [
    ['C4', 0.75], ['C4', 0.25], ['D4', 1], ['C4', 1], ['F4', 1], ['E4', 2],
    ['C4', 0.75], ['C4', 0.25], ['D4', 1], ['C4', 1], ['G4', 1], ['F4', 2],
    ['C4', 0.75], ['C4', 0.25], ['C5', 1], ['A4', 1], ['F4', 1], ['E4', 1], ['D4', 2],
    ['Bb4', 0.75], ['Bb4', 0.25], ['A4', 1], ['F4', 1], ['G4', 1], ['F4', 2]
];

// 核心觸發函式
function triggerCelebration() {
    if (isPlaying) return;
    
    if (!audioCtx) audioCtx = new AudioCtx();
    isPlaying = true;
    togglePartyMode(true);

    let currentTime = audioCtx.currentTime + 0.1;
    const tempo = 0.52;
    song.forEach(([note, duration]) => {
        playNote(FREQ[note], currentTime, duration * tempo);
        currentTime += duration * tempo;
    });

    const totalDuration = (currentTime - audioCtx.currentTime) * 1000;
    setTimeout(() => { 
        isPlaying = false; 
        togglePartyMode(false); 
    }, totalDuration);

    // 動畫效果
    const cake = document.getElementById('finalCake');
    cake.style.transform = 'scale(1.1)';
    setTimeout(() => { cake.style.transform = 'scale(1)'; }, 200);

    const chars = document.querySelectorAll('.char');
    chars.forEach(c => {
        c.style.transform = 'scale(1.15) translateY(-10px)';
        setTimeout(() => { c.style.transform = 'scale(1) translateY(0)'; }, 200);
    });
}

function playNote(freq, startTime, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle'; 
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.12, startTime + 0.05); 
    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration); 
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
}

function togglePartyMode(isParty) {
    const chars = document.querySelectorAll('.char');
    chars.forEach(c => {
        c.src = isParty ? c.getAttribute('data-party') : c.getAttribute('data-normal');
    });
}

// NFC 初始化
async function initNFC() {
    if ("NDEFReader" in window) {
        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            
            // 重要：一旦 NFC 成功啟動，設定為僅限 NFC 觸發
            isNFCOnly = true; 
            console.log("NFC 模式已啟動，螢幕點擊觸發已停用。");

            ndef.addEventListener("reading", () => {
                triggerCelebration();
            });
        } catch (error) {
            console.log("NFC 啟動失敗或權限被拒絕，切換為點擊模式。");
            isNFCOnly = false;
        }
    }
}

function createConfetti() {
    const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#ffffff', '#eccc68'];
    for (let i = 0; i < 65; i++) {
        const div = document.createElement('div');
        div.className = 'confetti';
        div.style.left = Math.random() * 100 + 'vw';
        div.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        div.style.animationDelay = Math.random() * 5 + 's';
        div.style.width = Math.random() * 10 + 6 + 'px';
        div.style.height = div.style.width;
        div.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(div);
    }
}

// 修改點擊事件：增加判斷條件
window.addEventListener('click', (e) => {
    // 如果是 NFC 模式，且點擊的不是下方的跳轉按鈕，就不觸發慶祝
    if (isNFCOnly && e.target.id !== 'actionBtn') {
        console.log("當前為 NFC 模式，請感應卡片");
        return;
    }
    
    // 如果不是 NFC 模式或是點擊了背景，才觸發
    if (e.target.id !== 'actionBtn') {
        triggerCelebration();
    }
});

window.onload = () => { 
    createConfetti(); 
    initNFC(); 
};
</script>
<script src="nfc-handler.js"></script>
</body>
</html>
