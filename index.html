<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>角色登入 - 科技任務</title>
<style>
@font-face {
  font-family: 'ChenYuluoyan';
  src: url('fonts/ChenYuluoyan-2.0-Thin.ttf') format('truetype');
}

html, body {
  width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
  background: #0b0c1a; color: #fff; font-family: 'ChenYuluoyan', sans-serif;
}

body {
  background: radial-gradient(ellipse at center, #0b0c1a 0%, #1a1c33 100%);
  display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
}

#stars { position:absolute; width:100%; height:100%; overflow:hidden; top:0; left:0; z-index:-1; }
.star { position:absolute; width:2px; height:2px; background:white; border-radius:50%; animation: starTwinkle linear infinite; }
@keyframes starTwinkle { 0%{opacity:0.3;transform:translateY(0);} 50%{opacity:1;} 100%{opacity:0.3;transform:translateY(-20px);} }

/* 密碼驗證遮罩 */
#startOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(11, 12, 26, 0.98); z-index: 100;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  transition: opacity 0.5s;
}

.login-box {
  background: rgba(0, 255, 255, 0.05);
  padding: 40px 20px; border: 2px solid #0ff; border-radius: 20px;
  box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
  text-align: center; width: 85%; max-width: 320px;
}

.login-box h2 { 
  color: #0ff; font-size: 2.2rem; margin-bottom: 10px; letter-spacing: 4px;
  font-family: 'ChenYuluoyan', sans-serif;
}
.hint { color: #aaa; font-size: 1.2rem; margin-bottom: 25px; }

/* 密碼輸入框 */
#passInput {
  width: 80%; background: transparent; border: none; border-bottom: 3px solid #0ff;
  color: #0ff; font-size: 2.8rem; text-align: center; letter-spacing: 12px;
  outline: none; margin-bottom: 30px; font-family: sans-serif; transition: border-color 0.3s;
}

/* 密碼錯誤動畫 */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-10px); }
  40%, 80% { transform: translateX(10px); }
}
.error-state { 
  animation: shake 0.4s ease-in-out; 
  border-bottom-color: #ff4d4d !important; 
  color: #ff4d4d !important;
  text-shadow: 0 0 10px #ff4d4d;
}

#loginBtn {
  background: #0ff; color: #000; border: none; padding: 12px 40px;
  border-radius: 50px; font-weight: bold; cursor: pointer; 
  font-size: 1.6rem; font-family: 'ChenYuluoyan', sans-serif;
  box-shadow: 0 0 15px #0ff;
}

/* 遊戲畫面區 */
#imageStage { margin-top: 6vh; margin-bottom: 4vh; width: 100%; height: 25vh; display: flex; justify-content: center; align-items: center; }
#imageStage img { width: 55vw; max-width: 300px; display: none; }

#dialog {
  font-size: 1.9rem; height: 18vh; display: flex; align-items: flex-start; justify-content: center;
  white-space: pre-wrap; line-height: 1.4; text-shadow: 0 0 0.3em #0ff, 0 0 0.6em #0ff;
  text-align: center; width: 95%; margin: 0 auto; padding-top: 2vh; box-sizing: border-box;
}

.alert-text { font-size: 2.3rem; font-weight: bold; color: #ff4d4d; text-shadow: 0 0 15px #ff4d4d; }

/* 卡牌區修正 */
#cardArea { display: none; margin-top: 2vh; }
.team-card {
  display: inline-block; width: 38vw; max-width: 170px; height: 55vw; max-height: 250px;
  margin: 2vw; border-radius: 15px; border: 2px solid #888;
  background: linear-gradient(145deg, #1a1c33, #2b2f50); box-shadow: 0 0 20px rgba(0,255,255,0.3);
  position: relative; overflow: hidden; animation: float 3s infinite ease-in-out;
}

.card-body { height: 75%; display: flex; justify-content: center; align-items: center; }
.card-body img { width: 90%; opacity: 0; transition: opacity 0.8s; }

/* 名字置中對齊優化 */
.card-footer { 
  background: rgba(26, 28, 51, 0.95); 
  height: 25%; 
  width: 100%;
  display: flex; 
  justify-content: center; 
  align-items: center; 
  font-size: 1.6rem; 
  color: #0ff; 
  border-top: 1px solid rgba(0,255,255,0.3);
  text-align: center;
  box-sizing: border-box;
}

#goBtn {
  display: none; margin-top: 4vh; padding: 15px 60px; 
  font-size: 2rem; font-weight: bold;
  background: rgba(11, 12, 26, 0.9); color: #0ff; border: 2px solid #0ff; border-radius: 50px;
  cursor: pointer; box-shadow: 0 0 20px #0ff; transition: all 0.3s ease; 
  letter-spacing: 4px; font-family: 'ChenYuluoyan', sans-serif;
}
.breathe { animation: goBreathe 2s infinite ease-in-out; }

@keyframes goBreathe { 0%, 100% { box-shadow: 0 0 10px #0ff; transform: scale(1); } 50% { box-shadow: 0 0 30px #0ff; transform: scale(1.05); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

#testArea { display: none; position: fixed; bottom: 10px; }
.testBtn { padding: 10px 20px; background: rgba(0,255,255,0.2); border: 1px solid #0ff; color: #0ff; border-radius: 5px; margin: 5px; font-size: 1.2rem; }
</style>
</head>
<body>

<div id="startOverlay">
  <div class="login-box">
    <h2>身份驗證</h2>
    <p class="hint">密碼提示: sunnyday</p>
    <input type="password" id="passInput" placeholder="****" inputmode="numeric" maxlength="4">
    <br>
    <button id="loginBtn" onclick="checkPass()">解鎖任務</button>
  </div>
</div>

<div id="stars"></div>
<div id="imageStage">
  <img id="pigStarImg" src="images/characters/pigstar.png">
  <img id="piggyImg" src="images/characters/pigpig.png">
</div>
<div id="dialog"></div>
<div id="cardArea">
  <div id="card1" class="team-card waiting"><div class="card-body"></div><div class="card-footer blink">---</div></div>
  <div id="card2" class="team-card waiting"><div class="card-body"></div><div class="card-footer blink">---</div></div>
</div>
<button id="goBtn" class="breathe" onclick="goNext()">GO!!!</button>

<div id="testArea"><button class="testBtn" onclick="scanCard('maoqiu')">手動：毛球</button><button class="testBtn" onclick="scanCard('hachu')">手動：哈啾</button></div>
<audio id="scanSound" src="music/scan.mp3"></audio>

<script>
// 初始化星空
const starsDiv = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s = document.createElement('div');
  s.className = 'star'; s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
  s.style.animationDuration = (Math.random()*2+1)+'s'; starsDiv.appendChild(s);
}

let team = [];
let calling = false;
const names = { maoqiu: "毛球", hachu: "哈啾" };
const wait = ms => new Promise(r => setTimeout(r, ms));

// 驗證密碼
async function checkPass() {
  const input = document.getElementById("passInput");
  const overlay = document.getElementById("startOverlay");
  
  if (input.value === "0411") {
    overlay.style.opacity = "0";
    setTimeout(() => overlay.style.display = "none", 500);
    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
    initNFC(); 
    startStory();
  } else {
    // 錯誤：晃動變紅
    input.classList.add("error-state");
    if (navigator.vibrate) navigator.vibrate(300);
    setTimeout(() => {
      input.classList.remove("error-state");
      input.value = "";
    }, 500);
  }
}

// 支援鍵盤 Enter
document.getElementById("passInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") checkPass();
});

// NFC 初始化
async function initNFC() {
  if ("NDEFReader" in window) {
    try {
      const ndef = new NDEFReader();
      await ndef.scan();
      ndef.onreading = ({ message }) => {
        for (const record of message.records) {
          const textDecoder = new TextDecoder(record.encoding);
          const rawData = textDecoder.decode(record.data).toLowerCase();
          const matchedId = Object.keys(names).find(id => rawData.includes(id));
          if (matchedId && !team.includes(matchedId) && calling) {
            if (navigator.vibrate) navigator.vibrate(200);
            scanCard(matchedId);
          }
        }
      };
    } catch (e) {
      document.getElementById("testArea").style.display = "block";
    }
  } else {
    document.getElementById("testArea").style.display = "block";
  }
}

async function startStory() {
  const dialog = document.getElementById("dialog");
  document.getElementById("pigStarImg").style.display = "block";
  if (navigator.vibrate) navigator.vibrate([100, 50, 200]);

  for(let i=0; i<3; i++) {
    dialog.innerHTML = `<div class="alert-text" style="margin-top:2vh">緊急任務!!! 緊急任務!!!</div>`;
    await wait(600); dialog.innerHTML = ""; await wait(400);
  }

  await typeText("我們將製作一個蛋糕🎂\n幫小豬慶生", 120);
  await wait(1200);
  await typeText("現在要呼叫兩位重要隊員來完成!!!", 120);
  await wait(1200);

  document.getElementById("pigStarImg").style.display = "none";
  document.getElementById("piggyImg").style.display = "block";
  document.getElementById("cardArea").style.display = "block";
  calling = true;
  dialog.classList.add("scanning-text");

  while(calling) {
    await typeText("呼叫中...呼叫中...", 120);
    await wait(800);
    if(!calling) break;
    dialog.innerHTML = ""; await wait(400);
  }
}

async function typeText(text, speed) {
  const dialog = document.getElementById("dialog");
  dialog.innerHTML = "<span></span>";
  const target = dialog.querySelector("span");
  for(let char of text) {
    target.innerHTML += char;
    if(!calling && text.includes("呼叫中")) return;
    await wait(speed);
  }
}

function scanCard(id) {
  if(!calling || team.includes(id)) return;
  team.push(id);
  const sfx = document.getElementById("scanSound");
  if(sfx) sfx.play().catch(e => {});
  
  let card = document.getElementById(team.length === 1 ? "card1" : "card2");
  card.classList.remove("waiting");
  card.querySelector(".card-footer").innerText = names[id];
  card.querySelector(".card-footer").classList.remove("blink");
  
  let img = document.createElement("img");
  img.src = `images/characters/${id}.png`;
  card.querySelector(".card-body").appendChild(img);
  setTimeout(() => img.style.opacity = 1, 50);

  if(team.length === 2) {
    calling = false;
    document.getElementById("dialog").classList.remove("scanning-text");
    document.getElementById("dialog").innerHTML = "";
    setTimeout(() => typeText("招集完畢 準備上工", 120), 500);
    document.getElementById("goBtn").style.display = "inline-block";
  }
}

function goNext() { alert("任務啟動！"); }
</script>
</body>
</html>
