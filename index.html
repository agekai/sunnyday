<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>角色登入 - 科技任務</title>
<style>
@font-face {
  font-family: 'ChenYuluoyan';
  src: url('fonts/ChenYuluoyan-2.0-Thin.ttf') format('truetype');
}

html, body {
  width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
  background: #0b0c1a; color: #fff; font-family: 'ChenYuluoyan', 'Microsoft JhengHei', sans-serif;
}

body {
  background: radial-gradient(ellipse at center, #0b0c1a 0%, #1a1c33 100%);
  display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
}

/* 星空背景 */
#stars { position: fixed; width: 100%; height: 100%; overflow: hidden; top: 0; left: 0; z-index: 0; pointer-events: none; }
.star { position: absolute; background: white; border-radius: 50%; box-shadow: 0 0 3px #fff; animation: starTwinkle linear infinite; }
@keyframes starTwinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

/* 登入與授權遮罩 */
#startOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(11, 12, 26, 0.98); z-index: 100;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  transition: opacity 0.5s;
}
.login-box {
  background: rgba(0, 255, 255, 0.05);
  padding: 30px; border: 1px solid #0ff; border-radius: 15px;
  box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
  text-align: center; width: 85%; max-width: 320px;
}
.login-box h2 { color: #0ff; font-size: clamp(24px, 6vw, 32px); margin-bottom: 10px; letter-spacing: 2px; }
.hint { color: #aaa; font-size: 16px; margin-bottom: 20px; line-height: 1.4; }

#passInput {
  width: 80%; background: transparent; border: none; border-bottom: 2px solid #0ff;
  color: #0ff; font-size: 32px; text-align: center; letter-spacing: 10px;
  outline: none; margin-bottom: 25px; font-family: sans-serif;
}

.btn-group { display: flex; flex-direction: column; gap: 12px; align-items: center; }

.action-btn {
  width: 100%; background: #0ff; color: #000; border: none; padding: 12px 0;
  border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 20px;
  transition: transform 0.2s;
}
.action-btn:active { transform: scale(0.95); }

.secondary-btn {
  background: transparent; color: #aaa; border: 1px solid #555; padding: 8px 20px;
  border-radius: 5px; cursor: pointer; font-size: 14px; text-decoration: underline;
}

.error-shake { animation: shake 0.3s; border-bottom-color: #ff4d4d !important; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

/* 劇情樣式 (略作微調以適應大字體) */
#imageStage { margin-top: 4vh; width: 100%; height: 25vh; display: flex; justify-content: center; align-items: center; position: relative; z-index: 1; }
#imageStage img { width: 40vw; max-width: 220px; display: none; filter: drop-shadow(0 0 10px #0ff); }
#dialog {
  font-size: clamp(20px, 5.5vw, 28px); height: 18vh; display: flex; align-items: center; justify-content: center;
  white-space: pre-wrap; line-height: 1.5; text-shadow: 0 0 8px #0ff;
  text-align: center; width: 90%; margin: 0 auto; position: relative; z-index: 1;
}
.alert-text { font-size: clamp(24px, 7vw, 32px); font-weight: bold; color: #ff4d4d; text-shadow: 0 0 15px #ff4d4d; }

#cardArea { display: none; margin-top: 1vh; position: relative; z-index: 1; text-align: center; width: 100%; }
.team-card {
  display: inline-block; width: 28vw; max-width: 150px; height: 38vw; max-height: 200px;
  margin: 10px; border-radius: 15px; border: 2px solid #0ff;
  background: rgba(26, 28, 51, 0.8); box-shadow: 0 0 15px rgba(0,255,255,0.3);
  position: relative; overflow: hidden; animation: float 3s infinite ease-in-out;
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.card-body { height: 75%; display: flex; justify-content: center; align-items: center; }
.card-body img { width: 85%; opacity: 0; transition: opacity 0.8s; }
.card-footer { background: rgba(0, 255, 255, 0.2); font-size: 18px; padding: 5px 0; color: #0ff; font-weight: bold; }
.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }

#goBtn {
  display: none; margin-top: 2vh; padding: 15px 50px; font-size: 22px; font-weight: bold;
  background: #000; color: #0ff; border: 3px solid #0ff; border-radius: 50px;
  cursor: pointer; box-shadow: 0 0 15px #0ff; transition: all 0.3s ease; letter-spacing: 4px; position: relative; z-index: 2;
}
.breathe { animation: goBreathe 2s infinite ease-in-out; }
@keyframes goBreathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 15px #0ff; } 50% { transform: scale(1.05); box-shadow: 0 0 30px #0ff; } }

#testArea { display: none; position: fixed; bottom: 15px; z-index: 10; width: 100%; text-align: center; }
.testBtn { padding: 10px 20px; background: rgba(0,255,255,0.2); border: 1px solid #0ff; color: #0ff; border-radius: 5px; margin: 5px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>

<div id="startOverlay">
  <div id="stepPassword" class="login-box">
    <h2>身份驗證</h2>
    <p class="hint">密碼提示: sunnyday</p>
    <input type="password" id="passInput" placeholder="****" inputmode="numeric" maxlength="4">
    <br>
    <div class="btn-group">
      <button class="action-btn" onclick="checkPass()">解鎖任務</button>
    </div>
  </div>

  <div id="stepNFC" class="login-box" style="display: none;">
    <h2>系統設定</h2>
    <p class="hint">是否開啟偵測功能？<br><small>(若關閉則需使用手動點擊模式)</small></p>
    <div class="btn-group">
      <button class="action-btn" onclick="handleNFCSelection(true)">是，開啟偵測</button>
      <button class="secondary-btn" onclick="handleNFCSelection(false)">否，暫不開啟</button>
    </div>
  </div>
</div>

<div id="stars"></div>
<div id="imageStage">
  <img id="pigStarImg" src="images/characters/pigstar.png">
  <img id="piggyImg" src="images/characters/pigpig.png">
</div>
<div id="dialog"></div>
<div id="cardArea">
  <div id="card1" class="team-card waiting"><div class="card-body"></div><div class="card-footer blink">---</div></div>
  <div id="card2" class="team-card waiting"><div class="card-body"></div><div class="card-footer blink">---</div></div>
</div>
<button id="goBtn" class="breathe" onclick="goNext()">GO!!!</button>

<div id="testArea">
  <button class="testBtn" onclick="scanCard('maoqiu')">模擬：毛球</button>
  <button class="testBtn" onclick="scanCard('hachu')">模擬：哈啾</button>
</div>

<audio id="scanSound" src="music/scan.mp3"></audio>

<script>
// 初始化星空
function createStars() {
  const starsDiv = document.getElementById('stars');
  starsDiv.innerHTML = '';
  for(let i=0; i<100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = (Math.random() * 2 + 1) + 'px';
    s.style.width = size; s.style.height = size;
    s.style.top = Math.random() * 100 + '%';
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    s.style.animationDelay = (Math.random() * 5) + 's';
    starsDiv.appendChild(s);
  }
}
createStars();

let team = [];
let calling = false;
const names = { maoqiu: "毛球", hachu: "哈啾" };
const wait = ms => new Promise(r => setTimeout(r, ms));

async function checkPass() {
  const input = document.getElementById("passInput");
  if (input.value === "0411") {
    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
    document.getElementById("stepPassword").style.display = "none";
    document.getElementById("stepNFC").style.display = "block";
  } else {
    input.classList.add("error-shake");
    if (navigator.vibrate) navigator.vibrate(200);
    setTimeout(() => {
      input.classList.remove("error-shake");
      input.value = "";
    }, 500);
  }
}

// 處理 NFC 選擇邏輯
async function handleNFCSelection(useNFC) {
  const overlay = document.getElementById("startOverlay");
  
  if (useNFC) {
    await initNFC();
  } else {
    // 使用者按「否」，強制顯示手動模擬按鈕
    document.getElementById("testArea").style.display = "block";
    console.log("使用者選擇不開啟 NFC");
  }
  
  // 進入劇情
  overlay.style.opacity = "0";
  setTimeout(() => {
    overlay.style.display = "none";
    startStory();
  }, 500);
}

document.getElementById("passInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") checkPass();
});

async function initNFC() {
  if ("NDEFReader" in window) {
    try {
      const ndef = new NDEFReader();
      await ndef.scan();
      ndef.onreading = ({ message }) => {
        for (const record of message.records) {
          const textDecoder = new TextDecoder(record.encoding);
          const rawData = textDecoder.decode(record.data).toLowerCase();
          const matchedId = Object.keys(names).find(id => rawData.includes(id));
          if (matchedId && !team.includes(matchedId) && calling) {
            if (navigator.vibrate) navigator.vibrate(200);
            scanCard(matchedId);
          }
        }
      };
    } catch (e) {
      // 雖然使用者按是，但硬體不支援或報錯，顯示手動按鈕
      document.getElementById("testArea").style.display = "block";
    }
  } else {
    document.getElementById("testArea").style.display = "block";
  }
}

async function startStory() {
  const dialog = document.getElementById("dialog");
  document.getElementById("pigStarImg").style.display = "block";
  if (navigator.vibrate) navigator.vibrate([100, 50, 200]);

  for(let i=0; i<3; i++) {
    dialog.innerHTML = `<div class="alert-text">緊急任務!!! 緊急任務!!!</div>`;
    await wait(600); dialog.innerHTML = ""; await wait(400);
  }

  await typeText("我們要製作一個蛋糕🎂\n幫小豬慶祝生日", 80);
  await wait(1200);
  await typeText("現在要呼叫兩位重要隊員來完成!!!", 80);
  await wait(1200);

  document.getElementById("pigStarImg").style.display = "none";
  document.getElementById("piggyImg").style.display = "block";
  document.getElementById("cardArea").style.display = "block";
  calling = true;
  
  while(calling) {
    dialog.className = "scanning-text";
    await typeText("呼叫中...呼叫中...", 100);
    await wait(800);
    if(!calling) break;
    dialog.innerHTML = ""; await wait(400);
  }
}

async function typeText(text, speed) {
  const dialog = document.getElementById("dialog");
  dialog.innerHTML = "<span></span>";
  const target = dialog.querySelector("span");
  for(let char of text) {
    target.innerHTML += char;
    if(!calling && text.includes("呼叫中")) return;
    await wait(speed);
  }
}

function scanCard(id) {
  if(!calling || team.includes(id)) return;
  team.push(id);
  const sfx = document.getElementById("scanSound");
  if(sfx) sfx.play().catch(e => {});
  
  let card = document.getElementById(team.length === 1 ? "card1" : "card2");
  card.classList.remove("waiting");
  card.querySelector(".card-footer").innerText = names[id];
  card.querySelector(".card-footer").classList.remove("blink");
  
  let img = document.createElement("img");
  img.src = `images/characters/${id}.png`;
  card.querySelector(".card-body").appendChild(img);
  setTimeout(() => img.style.opacity = 1, 50);

  if(team.length === 2) {
    calling = false;
    const dialog = document.getElementById("dialog");
    dialog.className = ""; 
    dialog.innerHTML = "";
    setTimeout(() => typeText("招集完畢 準備上工", 100), 500);
    document.getElementById("goBtn").style.display = "inline-block";
  }
}

function goNext() { alert("任務啟動！"); }
</script>
</body>
</html>
