<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>角色登入 - 科技任務</title>
<style>
@font-face {
  font-family: 'ChenYuluoyan';
  src: url('fonts/ChenYuluoyan-2.0-Thin.ttf') format('truetype');
}

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #0b0c1a;
}

body {
  background: radial-gradient(ellipse at center, #0b0c1a 0%, #1a1c33 100%);
  color: #fff;
  font-family: 'ChenYuluoyan', sans-serif;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
}

#stars { position:absolute; width:100%; height:100%; overflow:hidden; top:0; left:0; z-index:-1; }
.star { position:absolute; width:2px; height:2px; background:white; border-radius:50%; animation: starTwinkle linear infinite; }
@keyframes starTwinkle { 0%{opacity:0.3;transform:translateY(0);} 50%{opacity:1;} 100%{opacity:0.3;transform:translateY(-20px);} }

/* 圖片 Stage */
#imageStage {
  margin-top: 5vh;
  margin-bottom: 5vh;
  width: 100%;
  height: 28vh; 
  display: flex;
  justify-content: center;
  align-items: center;
}
#imageStage img {
  width: 35vw;
  max-width: 250px;
  display: none;
}

/* 對話框 */
#dialog {
  font-size: 3.5vw;
  height: 15vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  white-space: pre-wrap;
  line-height: 1.6;
  text-shadow: 0 0 0.2em #0ff, 0 0 0.4em #0ff, 0 0 0.8em #0ff, 0 0 1em #0ff;
  text-align: center;
  width: 90%;
  margin: 0 auto;
  padding-top: 2vh;
  box-sizing: border-box;
}

.scanning-text { animation: pulse 1.5s infinite ease-in-out; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.alert-text {
  font-size: 4.5vw;
  font-weight: bold;
  color: #ff4d4d;
  text-shadow: 0 0 0.4em #ff4d4d, 0 0 0.8em #ff8080;
}

/* 卡牌區 */
#cardArea { display: none; margin-top: 2vh; }
.team-card {
  display: inline-block;
  width: 21vw;
  max-width: 140px;
  height: 30vw;
  max-height: 200px;
  margin: 1.5vw;
  border-radius: 12px;
  border: 2px solid #888;
  background: linear-gradient(145deg, #1a1c33, #2b2f50);
  box-shadow: 0 0 1.5vw rgba(0,255,255,0.3);
  position: relative;
  overflow: hidden;
  animation: float 3s infinite ease-in-out;
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.waiting { animation: glow 1.5s infinite; }
@keyframes glow { 50% { box-shadow: 0 0 2vw rgba(0,255,255,0.7); } }

.card-body { height: 70%; display: flex; justify-content: center; align-items: center; }
.card-body img { width: 90%; opacity: 0; transition: opacity 0.8s; }
.card-footer { background: #1a1c33; font-size: 1.5vw; padding: 0.5vw; color: #0ff; }
.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }

/* 優化後的 GO 按鈕 */
#goBtn {
  display: none; 
  margin-top: 3vh;
  padding: 1.8vh 6vw; 
  font-size: 2.8vw; 
  font-weight: bold;
  background: rgba(11, 12, 26, 0.9); 
  color: #0ff; 
  border: 2px solid #0ff; 
  border-radius: 50px; 
  cursor: pointer;
  box-shadow: 0 0 1vw #0ff;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  letter-spacing: 2px;
  -webkit-tap-highlight-color: transparent;
}

#goBtn:hover {
  background: #0ff; 
  color: #000;
  box-shadow: 0 0 3vw #0ff;
  transform: scale(1.05);
}

@keyframes goBreathe {
  0%, 100% { box-shadow: 0 0 1vw #0ff, inset 0 0 0.5vw #0ff; }
  50% { box-shadow: 0 0 3vw #0ff, inset 0 0 1vw #0ff; }
}
.breathe { animation: goBreathe 2s infinite ease-in-out; }

/* 測試鈕平時隱藏 */
#testArea { display: none; margin-top: 2vh; }
#testBtn { padding: 1vh 2vw; font-size: 1.5vw; background: rgba(0,255,255,0.2); color: #0ff; border: 1px solid #0ff; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>

<div id="stars"></div>

<div id="imageStage">
  <img id="pigStarImg" src="images/characters/pigstar.png" alt="pigstar">
  <img id="piggyImg" src="images/characters/pigpig.png" alt="pigpig">
</div>

<div id="dialog"></div>

<div id="cardArea">
  <div id="card1" class="team-card waiting">
    <div class="card-body"></div>
    <div class="card-footer blink">---</div>
  </div>
  <div id="card2" class="team-card waiting">
    <div class="card-body"></div>
    <div class="card-footer blink">---</div>
  </div>
</div>

<button id="goBtn" class="breathe" onclick="goNext()">GO!!!</button>

<div id="testArea">
  <button id="testBtn" onclick="scanCard('maoqiu')">手動：刷毛球</button>
  <button id="testBtn" onclick="scanCard('hachu')">手動：刷哈啾</button>
</div>

<audio id="scanSound" src="music/scan.mp3"></audio>

<script>
// 初始化星星
const starsDiv = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s = document.createElement('div');
  s.className = 'star';
  s.style.top = Math.random()*100+'%';
  s.style.left = Math.random()*100+'%';
  s.style.animationDuration = (Math.random()*2+1)+'s';
  starsDiv.appendChild(s);
}

let team = [];
let calling = false;
const dialog = document.getElementById("dialog");
const cardArea = document.getElementById("cardArea");
const pigStarImg = document.getElementById("pigStarImg");
const piggyImg = document.getElementById("piggyImg");
const names = {maoqiu:"毛球", hachu:"哈啾"};

// 網址參數判斷
const urlParams = new URLSearchParams(window.location.search);
const isCommander = urlParams.get('start') === 'commander';

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function typeText(text, speed=120){
  dialog.innerHTML = "<span></span>"; 
  const target = dialog.querySelector("span");
  for(let i=0; i<text.length; i++){
    target.innerHTML += text[i];
    if(!calling && text.includes("呼叫中")) return; 
    await wait(speed);
  }
}

// NFC 監聽
async function initNFC() {
  if ("NDEFReader" in window) {
    try {
      const ndef = new NDEFReader();
      await ndef.scan();
      ndef.onreading = ({ message }) => {
        for (const record of message.records) {
          const textDecoder = new TextDecoder(record.encoding);
          const scannedId = textDecoder.decode(record.data).trim();
          if (names[scannedId] && !team.includes(scannedId) && calling) {
            if (navigator.vibrate) navigator.vibrate(200);
            scanCard(scannedId);
          }
        }
      };
    } catch (error) {
      console.log("NFC Error: " + error);
    }
  } else {
    // 不支援 NFC 時顯示測試按鈕供備用
    document.getElementById("testArea").style.display = "block";
  }
}

async function startStory(){ 
  // 開始劇情時震動一短一長
  if (navigator.vibrate) navigator.vibrate([100, 50, 200]);

  pigStarImg.style.display = "block";
  for(let i=0;i<3;i++){
    dialog.innerHTML=`<div class="alert-text" style="margin-top:2vh">緊急任務!!! 緊急任務!!!</div>`;
    await wait(600); dialog.innerHTML = "<span></span>"; await wait(400);
  }
  
  await typeText("我們將製作一個蛋糕🎂\n幫小豬慶生", 120); 
  await wait(1200);
  await typeText("現在要呼叫兩位重要隊員來完成!!!", 120); 
  await wait(1200);

  pigStarImg.style.display = "none";
  piggyImg.style.display = "block";
  cardArea.style.display = "block";
  calling = true;
  dialog.classList.add("scanning-text");
  
  initNFC(); // 進入呼叫狀態啟動 NFC 監聽
  
  while(calling){
    await typeText("呼叫中...呼叫中...", 120);
    await wait(800);
    if(!calling) break;
    dialog.innerHTML = "<span></span>"; 
    await wait(400);
  }
}

function scanCard(id){
  if(!calling || team.includes(id)) return;
  team.push(id);
  
  const sfx = document.getElementById("scanSound");
  if(sfx) sfx.play().catch(e => console.log("Audio deferred"));

  let target = team.length===1 ? "card1" : "card2";
  let card = document.getElementById(target);
  card.classList.remove("waiting");
  card.querySelector(".card-footer").innerText = names[id];
  card.querySelector(".card-footer").classList.remove("blink");
  
  let img = document.createElement("img");
  img.src = `images/characters/${id}.png`;
  card.querySelector(".card-body").appendChild(img);
  setTimeout(()=>img.style.opacity=1, 50);

  if(team.length===2){
    calling = false;
    dialog.classList.remove("scanning-text");
    dialog.innerHTML = "<span></span>";
    setTimeout(() => typeText("招集完畢 準備上工", 120), 500);
    document.getElementById("goBtn").style.display = "inline-block";
  }
}

function goNext(){ alert("任務啟動！"); }

// 入口判斷
window.onload = () => {
  if (isCommander) {
    startStory();
  } else {
    dialog.innerHTML = `<div style="color:#0ff; cursor:pointer; font-size:2.5vw;">請感應【豬豬指揮官】以啟動任務<br>(或點擊此處啟動)</div>`;
    dialog.onclick = () => {
      dialog.onclick = null;
      startStory();
    };
  }
};
</script>

</body>
</html>
